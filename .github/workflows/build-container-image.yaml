name: Build the container image

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  release:
    types:
      - published
  workflow_dispatch:

env:
  image_name: ghcr.io/${{ github.repository_owner }}/caddy-plus

jobs:
  build:
    name: Build the container image
    permissions:
      contents: read
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build the container image
        uses: docker/build-push-action@v7
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.image_name }}:${{ github.sha }}
            ${{ env.image_name }}:latest
          push: false
          load: true

      - name: Smoke test
        run: |
          docker run --rm ${{ env.image_name }}:${{ github.sha }} caddy version
          docker run --rm ${{ env.image_name }}:${{ github.sha }} caddy list-modules --skip-standard --versions

      - name: Log in to GitHub container registry
        if: github.event_name == 'push' || github.event_name == 'release'
        uses: docker/login-action@v4
        with:
          password: ${{ github.token }}
          registry: ghcr.io
          username: ${{ github.actor }}

      - name: Push SHA tagged image to registry
        if: github.event_name == 'push'
        run: docker push ${{ env.image_name }}:${{ github.sha }}

      - name: Push release image with latest tag
        if: github.event_name == 'release'
        run: |
          docker tag ${{ env.image_name }}:${{ github.sha }} ${{ env.image_name }}:${{ github.event.release.tag_name }}
          docker push ${{ env.image_name }}:${{ github.sha }}
          docker push ${{ env.image_name }}:${{ github.event.release.tag_name }}
          docker push ${{ env.image_name }}:latest
